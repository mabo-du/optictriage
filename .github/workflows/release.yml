name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-executables:
    name: Build OS Installers
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller optictriage.spec

      - name: Compress Linux/macOS
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czvf ../optictriage-${{ runner.os }}.tar.gz optictriage
        shell: bash

      - name: Compress Windows
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/optictriage -DestinationPath optictriage-Windows.zip
        shell: powershell

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            optictriage-*.tar.gz
            optictriage-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: build-executables
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/optictriage
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tool
        run: python -m pip install build

      - name: Build Source Distribution and Wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
